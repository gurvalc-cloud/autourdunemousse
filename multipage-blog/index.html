<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multipage Blog</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">My Blog</a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="post.html">Sample Post</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Welcome to Your Multipage Blog</h1>
      <p>Use this boilerplate to build a simple blog with separate HTML, CSS, and JavaScript files.</p>
    </section>

    <section class="posts" id="posts-list">
      <article class="post-card">
        <h2>Latest Post</h2>
        <p>This is a sample post preview. Click below to read the full story.</p>
        <a class="button" href="post.html">Read More</a>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Your Blog. Built with HTML, CSS & JavaScript.</div>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>
